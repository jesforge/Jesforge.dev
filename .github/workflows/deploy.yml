name: Deploy Blazor Server App

on:
  push:
    branches:
      - master  # Passe dies an, wenn dein Hauptbranch anders heißt
  workflow_dispatch: # Ermöglicht manuelles Triggern

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x' # Passe die Version an

      - name: Publish Blazor Server
        run: dotnet publish -c Release -o release --nologo

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: blazor-server-build
          path: release
          
  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: blazor-server-build
          path: release

      # Beispiel für Deployment auf einen Linux-Server per SSH
      - name: Deploy to Server via SSH
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "release/*"
          target: "/var/www/blazor-app"

      - name: Restart Service on Server
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            sudo systemctl restart blazor-app
